<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volitve 2026 v Državni Zbor</title>
  <!-- Chart.js za risanje grafov (charting library) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      padding: 1.5rem;
    }
    h1 { text-align: center; margin-bottom: .25rem; }
    #status {
      text-align: center;
      font-size: .85rem;
      color: #666;
      margin-bottom: 1rem;
    }
    .chart-container {
      max-width: 960px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      padding: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      margin-bottom: 1rem;
    }
    .chart-title {
      text-align: center;
      margin-bottom: .75rem;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <h1>🗳️ Volitve 2026 v Državni Zbor</h1>
  <p id="status">Nalagam podatke …</p>

  <div class="chart-container">
    <h2 class="chart-title">Zadnje stanje po volilnih enotah</h2>
    <canvas id="countChart"></canvas>
  </div>

  <script>
    // ---------------------------------------------------------------------------
    // Nastavitve (Settings)
    // ---------------------------------------------------------------------------
    const STETJE_CSV_URL = 'gold/štetje.csv';
    const REFRESH  = 60_000;               // osvežitev vsako minuto (ms)

    // Barve za skupine (skupina colours)
    const GROUP_COLORS = {
      democrats: 'rgba(30, 100, 220, 0.85)',   // modra (blue)
      others:    'rgba(220, 50, 50, 0.85)',     // rdeča (red)
    };

    // ---------------------------------------------------------------------------
    // Razčlenjevanje CSV-ja (CSV parsing)
    // ---------------------------------------------------------------------------
    function parseCSV(text) {
      const lines = text.trim().split('\n');
      if (lines.length < 2) return [];
      const headers = lines[0].split(',');
      return lines.slice(1)
        .filter(line => line.trim() !== '')   // preskoči prazne vrstice (skip blanks)
        .map(line => {
          const cols = line.split(',');
          const row = {};
          headers.forEach((h, i) => {
            let val = (cols[i] || '').trim();
            // Odstrani narekovaje, če so prisotni (remove surrounding quotes)
            if (val.startsWith('"') && val.endsWith('"')) {
              val = val.slice(1, -1);
            }
            row[h.trim().replace(/^"|"$/g, '')] = val;
          });
          return row;
        });
    }

    // ---------------------------------------------------------------------------
    // Risanje / posodabljanje grafa (draw / update chart)
    // ---------------------------------------------------------------------------
    let countChart = null;

    function buildCountDatasets(rows) {
      const labels = rows.map(r => r.en_naziv || '');
      const demokrati = rows.map(r => parseFloat(r.demokrati) || 0);
      const ostalo = rows.map(r => parseFloat(r.ostalo) || 0);
      const vseh = rows.map(r => parseFloat(r.vseh) || 0);
      const sivo = vseh.map((v, i) => Math.max(v - demokrati[i] - ostalo[i], 0));

      return {
        labels,
        datasets: [
          {
            label: 'demokrati',
            data: demokrati,
            backgroundColor: GROUP_COLORS.democrats,
            stack: 'vseh',
          },
          {
            label: 'ostalo',
            data: ostalo,
            backgroundColor: GROUP_COLORS.others,
            stack: 'vseh',
          },
          {
            label: 'vseh (neizpolnjeno)',
            data: sivo,
            backgroundColor: 'rgba(150, 150, 150, 0.75)',
            stack: 'vseh',
          },
        ],
      };
    }

    function renderCountChart(existingChart, payload) {
      const ctx = document.getElementById('countChart').getContext('2d');

      if (existingChart) {
        existingChart.data.labels = payload.labels;
        existingChart.data.datasets = payload.datasets;
        existingChart.update();
        return existingChart;
      }

      return new Chart(ctx, {
        type: 'bar',
        data: payload,
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'top' },
          },
          scales: {
            x: {
              stacked: true,
              ticks: { maxRotation: 45, minRotation: 45 },
              title: { display: true, text: 'Volilna enota' },
            },
            y: {
              stacked: true,
              beginAtZero: true,
              title: { display: true, text: 'Število volivcev' },
            },
          },
        },
      });
    }

    // ---------------------------------------------------------------------------
    // Pridobivanje podatkov in osvežitev (fetch & refresh)
    // ---------------------------------------------------------------------------
    async function loadData() {
      try {
        // Dodaj naključni parameter za izogib predpomnilniku (cache-bust)
        const ts = Date.now();
        const respStetje = await fetch(STETJE_CSV_URL + '?t=' + ts);
        if (!respStetje.ok) throw new Error('HTTP ' + respStetje.status);
        const textStetje = await respStetje.text();
        const stetjeRows = parseCSV(textStetje);
        const countPayload = buildCountDatasets(stetjeRows);
        countChart = renderCountChart(countChart, countPayload);
        document.getElementById('status').textContent =
          'Zadnja osvežitev: ' + new Date().toLocaleTimeString('sl-SI') +
          ' | Enot: ' + stetjeRows.length;
      } catch (err) {
        console.error('Napaka pri nalaganju CSV:', err);
        document.getElementById('status').textContent =
          'Napaka pri nalaganju podatkov – poskušam znova …';
      }
    }

    // Prvo nalaganje in nato periodično osveževanje (initial load + interval)
    loadData();
    setInterval(loadData, REFRESH);
  </script>

</body>
</html>
