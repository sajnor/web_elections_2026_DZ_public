<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volitve 2026 v Državni Zbor</title>
  <!-- Chart.js za risanje grafov (charting library) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <!-- Adapter za časovno os (time axis adapter) -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      padding: 1.5rem;
    }
    h1 { text-align: center; margin-bottom: .25rem; }
    #status {
      text-align: center;
      font-size: .85rem;
      color: #666;
      margin-bottom: 1rem;
    }
    .chart-container {
      max-width: 960px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      padding: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      margin-bottom: 1rem;
    }
    .chart-title {
      text-align: center;
      margin-bottom: .75rem;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <h1>🗳️ Volitve 2026 v Državni Zbor</h1>
  <p id="status">Nalagam podatke …</p>

  <div class="chart-container">
    <h2 class="chart-title">Volitve v Državni Zbor (2026)</h2>
    <canvas id="resultsChart"></canvas>
  </div>
  <div class="chart-container">
    <h2 class="chart-title">Volitve v Državni Zbor (2026) nad 4 % pragom</h2>
    <canvas id="resultsChartNad4"></canvas>
  </div>
  <div class="chart-container">
    <h2 class="chart-title">Zadnje stanje po volilnih enotah</h2>
    <canvas id="countChart"></canvas>
  </div>
  <div class="chart-container">
    <h2 class="chart-title">Delež predčasnih glasov</h2>
    <canvas id="predcasnoChart"></canvas>
  </div>

  <script>
    // ---------------------------------------------------------------------------
    // Nastavitve (Settings)
    // ---------------------------------------------------------------------------
    const CSV_URL  = 'gold/rezultati.csv';  // relativna pot do CSV (relative path)
    const STETJE_CSV_URL = 'gold/stej.csv';
    const PREDCASNO_CSV_URL = 'gold/predcasno.csv';
    const REFRESH  = 60_000;               // osvežitev vsako minuto (ms)
    const DASHED_LINE_PATTERN = [6, 6];

    // Barve za skupine (group colours)
    const GROUP_COLORS = {
      democrats: 'rgba(30, 100, 220, 0.85)',   // modra (blue)
      others:    'rgba(220, 50, 50, 0.85)',     // rdeča (red)
    };

    // ---------------------------------------------------------------------------
    // Razčlenjevanje CSV-ja (CSV parsing)
    // ---------------------------------------------------------------------------
    function parseCSV(text) {
      const lines = text.trim().split('\n');
      if (lines.length < 2) return [];
      const headers = lines[0].split(',');
      return lines.slice(1)
        .filter(line => line.trim() !== '')   // preskoči prazne vrstice (skip blanks)
        .map(line => {
          const cols = line.split(',');
          const row = {};
          headers.forEach((h, i) => {
            let val = (cols[i] || '').trim();
            // Odstrani narekovaje, če so prisotni (remove surrounding quotes)
            if (val.startsWith('"') && val.endsWith('"')) {
              val = val.slice(1, -1);
            }
            row[h.trim().replace(/^"|"$/g, '')] = val;
          });
          return row;
        });
    }

    // ---------------------------------------------------------------------------
    // Priprava podatkov za grafe (prepare chart datasets)
    // ---------------------------------------------------------------------------
    function buildDatasets(rows, fieldVsi, fieldBrez) {
      // Grupiraj po skupini (group by group)
      // Za vsako skupino seštej deleže vseh strank ob istem času
      const grouped = {};  // { group: { vsi: {time: totalPct}, brez: {time: totalPct} } }

      rows.forEach(r => {
        const g = r.skupina || r.group || 'others';
        const t = r.time;
        const vVsi = parseFloat(r[fieldVsi]) || 0;
        const vBrez = parseFloat(r[fieldBrez]) || 0;
        if (!grouped[g]) grouped[g] = { vsi: {}, brez: {} };
        grouped[g].vsi[t] = (grouped[g].vsi[t] || 0) + vVsi;
        grouped[g].brez[t] = (grouped[g].brez[t] || 0) + vBrez;
      });

      // Ustvari datasete za Chart.js:
      // - "rezultati_vsi" ostanejo kot doslej
      // - "rezultati_brez" so pol tanjši in prekinjeni
      return Object.entries(grouped).flatMap(([group, values]) => {
        // Poslovno pravilo: skupino "ZELENI" v prvih dveh grafih skrijemo.
        if (String(group).toLowerCase() === 'zeleni') {
          return [];
        }
        const sortedTimesVsi = Object.keys(values.vsi).sort();
        const sortedTimesBrez = Object.keys(values.brez).sort();
        const color = GROUP_COLORS[group] || '#999';

        return [
          {
            label: `${group} (vsi)`,
            data: sortedTimesVsi.map(t => ({ x: new Date(t), y: +values.vsi[t].toFixed(4) })),
            borderColor: color,
            backgroundColor: color.replace('0.85', '0.15'),
            fill: false,
            tension: 0.3,
            pointRadius: 3,
            borderWidth: 3,
          },
          {
            label: `${group} (brez)`,
            data: sortedTimesBrez.map(t => ({ x: new Date(t), y: +values.brez[t].toFixed(4) })),
            borderColor: color,
            backgroundColor: color.replace('0.85', '0.15'),
            fill: false,
            tension: 0.3,
            pointRadius: 0,
            borderWidth: 1.5,
            borderDash: DASHED_LINE_PATTERN,
          },
        ];
      });
    }

    // ---------------------------------------------------------------------------
    // Risanje / posodabljanje grafov (draw / update charts)
    // ---------------------------------------------------------------------------
    let chart = null;
    let chartNad4 = null;
    let countChart = null;
    let predcasnoChart = null;

    function renderChart(canvasId, existingChart, datasets, yMax = 100) {
      const ctx = document.getElementById(canvasId).getContext('2d');

      if (existingChart) {
        existingChart.data.datasets = datasets;
        existingChart.update();
        return existingChart;
      }

      const newChart = new Chart(ctx, {
        type: 'line',
        data: { datasets },
        options: {
          responsive: true,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'top' },
          },
          scales: {
            x: {
              type: 'time',
              time: {
                unit: 'minute',
                displayFormats: { minute: 'HH:mm' },
                tooltipFormat: 'HH:mm',
              },
              title: { display: true, text: 'Čas' },
              ticks: {
                source: 'auto',
                maxRotation: 90,
                minRotation: 90,
              },
            },
            y: {
              title: { display: true, text: 'Rezultat (%)' },
              min: 0,
              max: yMax,
            },
          },
        },
      });
      return newChart;
    }

    function buildCountDatasets(rows) {
      const labels = rows.map(r => r.en_naziv || '');
      const demokrati = rows.map(r => parseFloat(r.demokrati) || 0);
      const ostalo = rows.map(r => parseFloat(r.ostalo) || 0);
      const vseh = rows.map(r => parseFloat(r.vseh) || 0);
      const sivo = vseh.map((v, i) => Math.max(v - demokrati[i] - ostalo[i], 0));

      return {
        labels,
        datasets: [
          {
            label: 'demokrati',
            data: demokrati,
            backgroundColor: GROUP_COLORS.democrats,
            stack: 'vseh',
          },
          {
            label: 'ostalo',
            data: ostalo,
            backgroundColor: GROUP_COLORS.others,
            stack: 'vseh',
          },
          {
            label: 'vseh (neizpolnjeno)',
            data: sivo,
            backgroundColor: 'rgba(150, 150, 150, 0.75)',
            stack: 'vseh',
          },
        ],
      };
    }

    function renderCountChart(existingChart, payload) {
      const ctx = document.getElementById('countChart').getContext('2d');

      if (existingChart) {
        existingChart.data.labels = payload.labels;
        existingChart.data.datasets = payload.datasets;
        existingChart.update();
        return existingChart;
      }

      return new Chart(ctx, {
        type: 'bar',
        data: payload,
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'top' },
          },
          scales: {
            x: {
              stacked: true,
              ticks: { maxRotation: 45, minRotation: 45 },
              title: { display: true, text: 'Volilna enota' },
            },
            y: {
              stacked: true,
              beginAtZero: true,
              title: { display: true, text: 'Število volivcev' },
            },
          },
        },
      });
    }

    function buildPredcasnoDataset(rows) {
      const perTime = {};
      rows.forEach(r => {
        const t = r.time;
        if (!t) return;
        if (!perTime[t]) {
          perTime[t] = { upr: 0, odd: 0 };
        }
        perTime[t].upr += parseFloat(r.volilnih_upravicencev) || 0;
        perTime[t].odd += parseFloat(r.oddanih_glasovnic) || 0;
      });

      const points = Object.keys(perTime).sort().map(t => {
        const upr = perTime[t].upr;
        const odd = perTime[t].odd;
        const delez = upr > 0 ? (odd / upr) * 100 : 0;
        return { x: new Date(t), y: +delez.toFixed(4) };
      });

      return [{
        label: 'predčasni delež (%)',
        data: points,
        borderColor: 'rgba(128, 0, 128, 0.9)',
        backgroundColor: 'rgba(128, 0, 128, 0.2)',
        fill: false,
        tension: 0.25,
        pointRadius: 3,
        borderWidth: 2.5,
      }];
    }

    // ---------------------------------------------------------------------------
    // Pridobivanje podatkov in osvežitev (fetch & refresh)
    // ---------------------------------------------------------------------------
    async function loadData() {
      try {
        // Dodaj naključni parameter za izogib predpomnilniku (cache-bust)
        const ts = Date.now();
        const [respResults, respStetje, respPredcasno] = await Promise.allSettled([
          fetch(CSV_URL + '?t=' + ts),
          fetch(STETJE_CSV_URL + '?t=' + ts),
          fetch(PREDCASNO_CSV_URL + '?t=' + ts),
        ]);
        if (respResults.status !== 'fulfilled') {
          throw new Error('Napaka pri nalaganju rezultati.csv: ' + String(respResults.reason || 'neznan razlog'));
        }
        const resultsResponse = respResults.value;
        const stetjeResponse = respStetje.status === 'fulfilled' ? respStetje.value : null;
        const predcasnoResponse = respPredcasno.status === 'fulfilled' ? respPredcasno.value : null;
        if (!resultsResponse.ok) throw new Error('HTTP ' + resultsResponse.status);
        const textResults = await resultsResponse.text();
        const textStetje = stetjeResponse && stetjeResponse.ok ? await stetjeResponse.text() : '';
        const textPredcasno = predcasnoResponse && predcasnoResponse.ok ? await predcasnoResponse.text() : '';
        const rows = parseCSV(textResults);
        const stetjeRows = parseCSV(textStetje);
        const predcasnoRows = parseCSV(textPredcasno);
        const datasets = buildDatasets(rows, 'rezultati_vsi', 'rezultati_brez');
        const datasetsNad4 = buildDatasets(rows, 'rezultati_vsi_nad4', 'rezultati_brez_nad4');
        const countPayload = buildCountDatasets(stetjeRows);
        const predcasnoDatasets = buildPredcasnoDataset(predcasnoRows);
        chart = renderChart('resultsChart', chart, datasets, 50);
        chartNad4 = renderChart('resultsChartNad4', chartNad4, datasetsNad4, 50);
        countChart = renderCountChart(countChart, countPayload);
        predcasnoChart = renderChart('predcasnoChart', predcasnoChart, predcasnoDatasets, 20);
        document.getElementById('status').textContent =
          'Zadnja osvežitev: ' + new Date().toLocaleTimeString('sl-SI') +
          ' | Vrstic: ' + rows.length +
          ' | Enot: ' + stetjeRows.length +
          ' | Predčasno: ' + predcasnoRows.length;
      } catch (err) {
        console.error('Napaka pri nalaganju CSV:', err);
        document.getElementById('status').textContent =
          'Napaka pri nalaganju podatkov – poskušam znova …';
      }
    }

    // Prvo nalaganje in nato periodično osveževanje (initial load + interval)
    loadData();
    setInterval(loadData, REFRESH);
  </script>

</body>
</html>
